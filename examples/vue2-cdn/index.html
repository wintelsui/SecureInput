<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureInput Vue2 CDN Example</title>
    <style>
      :root {
        font-family: "PingFang SC", "Noto Sans SC", "Segoe UI", sans-serif;
        color: #17202a;
        background: linear-gradient(135deg, #f7fbff, #ffffff);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(560px, 100%);
        border-radius: 16px;
        background: #fff;
        border: 1px solid #d9e7f5;
        box-shadow: 0 12px 36px rgba(18, 52, 88, 0.1);
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px 0;
        font-size: 24px;
      }

      p {
        margin: 0 0 16px 0;
        color: #5d6d7e;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input {
        width: 100%;
        height: 44px;
        padding: 0 12px;
        border: 1px solid #9fb8d1;
        border-radius: 10px;
        font-size: 16px;
      }

      input:focus {
        outline: none;
        border-color: #2f80ed;
        box-shadow: 0 0 0 4px rgba(47, 128, 237, 0.15);
      }

      .preview {
        margin-top: 16px;
        padding: 12px;
        border-radius: 10px;
        background: #f4f8fc;
        color: #2f3f51;
        line-height: 1.8;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div id="app" class="page">
      <section class="card">
        <h1>SecureInput Vue2 示例</h1>
        <p>只允许字母与数字，前后各显示 2 位，中间自动掩码。</p>

        <label for="secure-input">证件号码</label>
        <secure-input
          id="secure-input"
          v-model="secureText"
          :maxlength="54"
          display-num
          placeholder="请输入字母数字"
        ></secure-input>

        <div class="preview">
          <div><strong>真实值：</strong>{{ secureText }}</div>
          <div><strong>显示值：</strong>{{ maskValue(secureText) }}</div>
        </div>
      </section>
    </div>

    <script type="module">
      import Vue from "https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.esm.browser.js";
      import { SecureInput } from "../../src/vue2/index.js";
      import { maskValue } from "../../src/core/secureInputCore.js";

      new Vue({
        el: "#app",
        components: {
          SecureInput,
        },
        data() {
          return {
            secureText: "A1B2C3D4",
          };
        },
        methods: {
          maskValue,
        },
      });
    </script>
  </body>
</html>
